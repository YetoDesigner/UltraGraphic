<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Ultra - Panel de Control</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Supabase Client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #1a1a1a;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 10px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #F27D26;
        }
    </style>
</head>
<body class="bg-black text-white h-screen flex overflow-hidden font-sans">

    <!-- Sidebar (User List) -->
    <div class="w-80 bg-[#121212] border-r border-white/10 flex flex-col">
        <div class="p-6 border-b border-white/10 flex items-center justify-between">
            <h1 class="text-xl font-bold text-[#F27D26]">Admin Ultra</h1>
            <div class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></div>
        </div>
        
        <!-- Search -->
        <div class="p-4">
            <div class="relative">
                <i class="fas fa-search absolute left-3 top-3 text-white/40"></i>
                <input type="text" placeholder="Buscar cliente..." class="w-full bg-white/5 border border-white/10 rounded-lg py-2 pl-10 pr-4 text-sm focus:outline-none focus:border-[#F27D26]">
            </div>
        </div>

        <!-- Users List -->
        <div id="usersList" class="flex-1 overflow-y-auto custom-scrollbar p-2 space-y-1">
            <!-- Dynamic users will appear here -->
            <div class="text-center text-white/40 mt-10 text-sm">Cargando chats...</div>
        </div>
    </div>

    <!-- Main Chat Area -->
    <div class="flex-1 flex flex-col bg-[#0a0a0a] relative">
        <!-- Chat Header -->
        <div id="chatHeader" class="h-16 border-b border-white/10 flex items-center justify-between px-6 bg-[#121212]">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-full bg-white/10 flex items-center justify-center">
                    <i class="fas fa-user text-white/60"></i>
                </div>
                <div>
                    <h2 id="currentChatUser" class="font-bold">Selecciona un chat</h2>
                    <p id="currentChatStatus" class="text-xs text-green-500 hidden">En línea</p>
                </div>
            </div>
            <button class="text-white/40 hover:text-[#F27D26] transition-colors">
                <i class="fas fa-ellipsis-v"></i>
            </button>
        </div>

        <!-- Messages Container -->
        <div id="messagesContainer" class="flex-1 overflow-y-auto custom-scrollbar p-6 space-y-4">
            <!-- Welcome State -->
            <div class="h-full flex flex-col items-center justify-center text-white/20">
                <i class="fas fa-comments text-6xl mb-4"></i>
                <p>Selecciona una conversación para comenzar</p>
            </div>
        </div>

        <!-- Input Area -->
        <div class="p-4 bg-[#121212] border-t border-white/10">
            <div class="flex items-end gap-3 max-w-4xl mx-auto relative">
                <!-- Attachments -->
                <button id="attachBtn" class="p-3 text-white/40 hover:text-[#F27D26] transition-colors">
                    <i class="fas fa-paperclip text-xl"></i>
                </button>
                <input type="file" id="fileInput" class="hidden" accept="image/*,audio/*">

                <!-- Text Input -->
                <div class="flex-1 bg-white/5 rounded-2xl border border-white/10 focus-within:border-[#F27D26] transition-colors relative">
                    <textarea id="messageInput" rows="1" placeholder="Escribe un mensaje..." class="w-full bg-transparent text-white p-3 pr-10 focus:outline-none resize-none custom-scrollbar max-h-32"></textarea>
                    <button id="emojiBtn" class="absolute right-3 bottom-3 text-white/40 hover:text-yellow-400">
                        <i class="far fa-smile"></i>
                    </button>
                </div>

                <!-- Mic / Send Button -->
                <button id="recordBtn" class="w-12 h-12 rounded-full bg-white/10 hover:bg-[#F27D26] flex items-center justify-center text-white transition-all group">
                    <i class="fas fa-microphone group-hover:scale-110 transition-transform"></i>
                </button>
                <button id="sendBtn" class="w-12 h-12 rounded-full bg-[#F27D26] hover:bg-orange-600 flex items-center justify-center text-white transition-all shadow-lg shadow-orange-500/20">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>
            
            <!-- Recording Indicator -->
            <div id="recordingIndicator" class="hidden absolute bottom-20 left-1/2 -translate-x-1/2 bg-red-500/90 text-white px-4 py-2 rounded-full flex items-center gap-3 backdrop-blur-md animate-pulse">
                <div class="w-2 h-2 rounded-full bg-white animate-ping"></div>
                <span class="font-bold text-sm">Grabando...</span>
                <button id="cancelRecordBtn" class="ml-2 hover:text-white/80"><i class="fas fa-times"></i></button>
            </div>
        </div>
    </div>

    <!-- Image Preview Modal -->
    <div id="imageModal" class="fixed inset-0 z-50 bg-black/90 hidden flex items-center justify-center p-4">
        <button onclick="document.getElementById('imageModal').classList.add('hidden')" class="absolute top-4 right-4 text-white text-2xl hover:text-[#F27D26]">
            <i class="fas fa-times"></i>
        </button>
        <img id="modalImage" src="" class="max-w-full max-h-full rounded-lg shadow-2xl">
    </div>

    <script>
        // Supabase Config (REPLACE WITH YOUR ACTUAL KEYS)
        const supabaseUrl = 'https://rfrddlornidezuggoiya.supabase.co';
        const supabaseKey = 'sb_publishable_mbLLuC1_Cz1YoUxF1sUxLg_Oe-b6LmQ';
        const supabase = supabase.createClient(supabaseUrl, supabaseKey);

        // State
        let currentUserId = null; // ID of the user we are chatting with
        let mediaRecorder = null;
        let audioChunks = [];
        let isRecording = false;

        // Elements
        const usersList = document.getElementById('usersList');
        const messagesContainer = document.getElementById('messagesContainer');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const recordBtn = document.getElementById('recordBtn');
        const attachBtn = document.getElementById('attachBtn');
        const fileInput = document.getElementById('fileInput');
        const recordingIndicator = document.getElementById('recordingIndicator');
        const cancelRecordBtn = document.getElementById('cancelRecordBtn');
        const currentChatUser = document.getElementById('currentChatUser');

        // Init
        async function init() {
            // Load users who have sent messages
            await loadUsers();
            
            // Subscribe to new messages
            supabase
                .channel('public:messages')
                .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, payload => {
                    handleNewMessage(payload.new);
                })
                .subscribe();
        }

        async function loadUsers() {
            // Get unique sender_ids that are NOT 'admin'
            const { data, error } = await supabase
                .from('messages')
                .select('sender_id, created_at, content')
                .neq('sender_id', 'admin')
                .order('created_at', { ascending: false });

            if (error) {
                console.error('Error loading users:', error);
                return;
            }

            // Group by sender_id to get unique users
            const users = {};
            data.forEach(msg => {
                if (!users[msg.sender_id]) {
                    users[msg.sender_id] = msg; // Keep latest message
                }
            });

            renderUsers(Object.values(users));
        }

        function renderUsers(users) {
            usersList.innerHTML = '';
            users.forEach(user => {
                const el = document.createElement('div');
                el.className = `p-4 hover:bg-white/5 cursor-pointer rounded-lg transition-colors border border-transparent hover:border-white/5 flex items-center gap-3 ${currentUserId === user.sender_id ? 'bg-white/10 border-white/10' : ''}`;
                el.onclick = () => selectUser(user.sender_id);
                el.innerHTML = `
                    <div class="w-10 h-10 rounded-full bg-gradient-to-tr from-[#F27D26] to-purple-600 flex items-center justify-center text-white font-bold shrink-0">
                        ${user.sender_id.substring(0, 2).toUpperCase()}
                    </div>
                    <div class="flex-1 min-w-0">
                        <div class="flex justify-between items-baseline">
                            <h4 class="font-bold text-sm text-white truncate">Usuario ${user.sender_id.substring(0, 4)}...</h4>
                            <span class="text-xs text-white/40">${new Date(user.created_at).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</span>
                        </div>
                        <p class="text-xs text-white/60 truncate">${user.content || 'Archivo adjunto'}</p>
                    </div>
                `;
                usersList.appendChild(el);
            });
        }

        async function selectUser(userId) {
            currentUserId = userId;
            currentChatUser.innerText = `Usuario: ${userId}`;
            loadMessages(userId);
            
            // Update UI active state
            Array.from(usersList.children).forEach(child => child.classList.remove('bg-white/10', 'border-white/10'));
            // ( Ideally re-render list to apply active class properly )
        }

        async function loadMessages(userId) {
            messagesContainer.innerHTML = '<div class="text-center text-white/40 mt-10">Cargando historial...</div>';
            
            const { data, error } = await supabase
                .from('messages')
                .select('*')
                .or(`sender_id.eq.${userId},receiver_id.eq.${userId}`)
                .order('created_at', { ascending: true });

            if (error) {
                console.error(error);
                return;
            }

            messagesContainer.innerHTML = '';
            data.forEach(msg => appendMessage(msg));
            scrollToBottom();
        }

        function appendMessage(msg) {
            const isMe = msg.sender_id === 'admin'; // Assume current user is admin
            const div = document.createElement('div');
            div.className = `flex ${isMe ? 'justify-end' : 'justify-start'}`;
            
            let contentHtml = '';
            if (msg.type === 'text') {
                contentHtml = `<p>${msg.content}</p>`;
            } else if (msg.type === 'image') {
                contentHtml = `<img src="${msg.content}" class="max-w-[200px] rounded-lg cursor-pointer" onclick="openImageModal(this.src)">`;
            } else if (msg.type === 'audio') {
                contentHtml = `<audio controls src="${msg.content}" class="max-w-[200px]"></audio>`;
            }

            div.innerHTML = `
                <div class="max-w-[70%] rounded-2xl px-4 py-3 ${isMe ? 'bg-[#F27D26] text-white rounded-tr-none' : 'bg-white/10 text-white rounded-tl-none'}">
                    ${contentHtml}
                    <div class="text-[10px] opacity-60 text-right mt-1">${new Date(msg.created_at).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</div>
                </div>
            `;
            messagesContainer.appendChild(div);
            scrollToBottom();
        }

        function handleNewMessage(msg) {
            // If message belongs to current chat
            if (msg.sender_id === currentUserId || msg.receiver_id === currentUserId) {
                appendMessage(msg);
            }
            // Refresh user list to show latest message preview
            loadUsers();
        }

        function scrollToBottom() {
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        // Sending Logic
        async function sendMessage(content, type = 'text') {
            if (!currentUserId) return alert('Selecciona un usuario primero');

            const { error } = await supabase.from('messages').insert({
                content: content,
                type: type,
                sender_id: 'admin',
                receiver_id: currentUserId,
                is_admin: true,
                read: false
            });

            if (error) {
                console.error('Error sending:', error);
                alert('Error al enviar: ' + error.message);
            } else {
                console.log('Admin message sent!');
                messageInput.value = '';
                toggleSendButton();
            }
        }

        // UI Interactions
        messageInput.addEventListener('input', toggleSendButton);
        
        function toggleSendButton() {
            if (messageInput.value.trim()) {
                sendBtn.classList.remove('opacity-50', 'cursor-not-allowed', 'grayscale');
                sendBtn.disabled = false;
                
                recordBtn.classList.add('hidden');
                recordBtn.classList.remove('flex');
            } else {
                sendBtn.classList.add('opacity-50', 'cursor-not-allowed', 'grayscale');
                sendBtn.disabled = true;
                
                recordBtn.classList.remove('hidden');
                recordBtn.classList.add('flex');
            }
            // Ensure Send Button is ALWAYS visible
            sendBtn.classList.remove('hidden');
            sendBtn.classList.add('flex');
        }
        
        // Init state
        toggleSendButton();

        sendBtn.addEventListener('click', () => {
            const text = messageInput.value.trim();
            if (text) sendMessage(text, 'text');
        });

        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendBtn.click();
            }
        });

        // File Upload
        attachBtn.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const fileExt = file.name.split('.').pop();
            const fileName = `${Date.now()}.${fileExt}`;
            const filePath = `${currentUserId}/${fileName}`;

            // Upload
            const { data, error } = await supabase.storage.from('chat-files').upload(filePath, file);
            
            if (error) {
                console.error('Upload error:', error);
                return;
            }

            const { data: { publicUrl } } = supabase.storage.from('chat-files').getPublicUrl(filePath);
            const type = file.type.startsWith('image/') ? 'image' : 'audio';
            sendMessage(publicUrl, type);
        });

        // Audio Recording
        recordBtn.addEventListener('click', startRecording);
        cancelRecordBtn.addEventListener('click', cancelRecording);

        async function startRecording() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];

                mediaRecorder.ondataavailable = (e) => audioChunks.push(e.data);
                mediaRecorder.onstop = async () => {
                    if (!isRecording) return; // Cancelled
                    const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                    const file = new File([audioBlob], "voice_note.webm", { type: 'audio/webm' });
                    
                    // Upload logic same as file
                    const fileName = `${Date.now()}.webm`;
                    const filePath = `${currentUserId}/${fileName}`;
                    const { error } = await supabase.storage.from('chat-files').upload(filePath, file);
                    if (!error) {
                        const { data: { publicUrl } } = supabase.storage.from('chat-files').getPublicUrl(filePath);
                        sendMessage(publicUrl, 'audio');
                    }
                };

                mediaRecorder.start();
                isRecording = true;
                recordingIndicator.classList.remove('hidden');
            } catch (err) {
                console.error('Mic error:', err);
                alert('No se pudo acceder al micrófono');
            }
        }

        function cancelRecording() {
            isRecording = false;
            if (mediaRecorder) mediaRecorder.stop();
            recordingIndicator.classList.add('hidden');
        }

        // Image Modal
        window.openImageModal = (src) => {
            document.getElementById('modalImage').src = src;
            document.getElementById('imageModal').classList.remove('hidden');
        }

        // Start
        init();
    </script>
</body>
</html>
