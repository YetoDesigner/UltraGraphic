<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Vinilo - Ultra Graphic</title>
    <link rel="icon" href="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEj9dbXCLX0LwICy_lfT6QHQKT4sSKxvKC0zl3lxT9e2giqf_Y5CO6SHu8YMNAnHPSe_Vfmi1_9NMCmYcdJ3oDHQfcfhcNalQnMSNzj6IdfqCGoc84H3f5q3HcxYUk8KHGPjCI2fVLxgNgCmqTwVGO3Y9qXSf1fhgut85W8v4qPywTVhyphenhyphentFiy8vSNFFn_aY9/s3543/DWDAWDAWD.png" type="image/png">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@600;700;800&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Outfit', 'sans-serif'],
                    },
                    colors: {
                        primary: '#F27D26',
                        surface: '#121212',
                        card: '#1E1E1E',
                    }
                }
            }
        }
    </script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: black; color: white; font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }
        .glass-panel { background: rgba(30, 30, 30, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .input-dark { background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); color: white; }
        .input-dark:focus { border-color: #F27D26; outline: none; box-shadow: 0 0 10px rgba(242,125,38,0.2); }
        
        /* Animations */
        @keyframes pageLoad {
            0% { opacity: 0; transform: translateY(30px) scale(0.98); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }
        .animate-page-load {
            /* Element starting opacity to prevent flash before animation */
            animation: pageLoad 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes headerReveal {
            0% { transform: translateY(-20px); opacity: 0; filter: blur(10px); }
            100% { transform: translateY(0); opacity: 1; filter: blur(0px); }
        }
        .animate-header-reveal {
            display: inline-block;
            animation: headerReveal 1s cubic-bezier(0.16, 1, 0.3, 1) 0.2s backwards;
        }
    </style>
</head>
<body class="min-h-screen pb-24 relative overflow-x-hidden flex flex-col items-center">
    
    <!-- Background Effects -->
    <div class="fixed top-20 -left-20 w-64 h-64 bg-primary/20 rounded-full blur-[100px] pointer-events-none"></div>
    <div class="fixed bottom-20 -right-20 w-80 h-80 bg-orange-600/10 rounded-full blur-[120px] pointer-events-none"></div>

    <!-- Header with Back Button (Pill Design) -->
    <header class="px-6 pt-8 pb-4 sticky top-0 z-50 flex justify-center w-full">
        <div class="max-w-2xl mx-auto bg-black/20 backdrop-blur-md border border-white/10 pl-2 pr-4 py-2 rounded-full flex items-center justify-between w-full shadow-xl shadow-primary/5 transition-all duration-500 transform translate-y-0 opacity-100">
            <!-- Back Button replacing Logo -->
            <div class="flex items-center gap-3">
                <button onclick="window.location.href='index.html'" class="w-12 h-12 flex items-center justify-center rounded-full bg-white/5 hover:bg-white/10 border border-white/5 transition-all active:scale-95 group">
                    <i class="fas fa-arrow-left text-white/70 group-hover:text-white transition-colors"></i>
                </button>
            </div>

            <!-- Centered Text -->
            <h1 class="text-lg font-display font-bold tracking-tight whitespace-nowrap absolute left-1/2 -translate-x-1/2 overflow-hidden">
                <span class="animate-header-reveal">
                    Calculadora <span class="text-primary">Vinilo</span>
                </span>
            </h1>

            <!-- Empty div to balance flex spacing -->
            <div class="w-12"></div>
        </div>
    </header>

    <!-- Main Calculator Card -->
    <!-- Opacity-0 at inline style ensures it's invisible before animation starts -->
    <div class="w-full max-w-2xl px-6 w-full relative z-10 animate-page-load" style="opacity: 0;">
        <main class="glass-panel rounded-3xl p-6 md:p-8 shadow-2xl w-full">
            <h2 class="text-2xl font-bold mb-6 flex items-center gap-2">
                <div class="w-10 h-10 rounded-full bg-primary/20 flex items-center justify-center border border-primary/30">
                    <i class="fas fa-calculator text-primary"></i>
                </div>
                Cotizador Inteligente
            </h2>

            <div class="space-y-6">
                <!-- Product Type Selection -->
                <div>
                    <label class="block text-xs text-primary font-bold uppercase tracking-wider mb-2 ml-1">Tipo de Vinilo</label>
                    <div class="relative group">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <i class="fas fa-layer-group text-white/30 group-focus-within:text-primary transition-colors"></i>
                        </div>
                        <select id="vinylType" onchange="updateOptionsAndCalculate()" class="w-full input-dark rounded-xl py-3.5 pl-11 pr-10 appearance-none transition-all cursor-pointer">
                            <option value="impresion">Impresión Vinilo Standard</option>
                            <option value="troquelado">Vinilo Troquelado</option>
                            <option value="esmerilado">Vinilo Esmerilado (Sandblasting)</option>
                            <option value="transparente">Vinilo Transparente</option>
                            <option value="microperforado">Vinilo Microperforado</option>
                        </select>
                        <div class="absolute inset-y-0 right-0 pr-4 flex items-center pointer-events-none">
                            <i class="fas fa-chevron-down text-white/50"></i>
                        </div>
                    </div>
                </div>

                <!-- Dimensions -->
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs text-primary font-bold uppercase tracking-wider mb-2 ml-1">Ancho (cm)</label>
                        <div class="relative group">
                            <input type="number" id="calcWidth" class="w-full input-dark rounded-xl py-3.5 px-4 text-center text-xl transition-all font-mono placeholder-white/20" placeholder="100" oninput="calculatePrice()">
                        </div>
                    </div>
                    <div>
                        <label class="block text-xs text-primary font-bold uppercase tracking-wider mb-2 ml-1">Alto (cm)</label>
                        <div class="relative group">
                            <input type="number" id="calcHeight" class="w-full input-dark rounded-xl py-3.5 px-4 text-center text-xl transition-all font-mono placeholder-white/20" placeholder="100" oninput="calculatePrice()">
                        </div>
                    </div>
                </div>
                
                <div class="text-center text-sm text-primary font-mono mb-2" id="areaDisplay">Área: 0.00 m²</div>

                <!-- Options -->
                <div class="space-y-3 bg-black/40 p-5 rounded-xl border border-white/5 shadow-inner">
                    <!-- Installation -->
                    <div class="flex items-center justify-between">
                        <div class="flex items-center gap-3">
                            <div class="w-8 h-8 rounded-full bg-white/5 flex items-center justify-center">
                                <i class="fas fa-tools text-white/60 text-sm"></i>
                            </div>
                            <span class="text-sm font-bold text-white/90">Instalación</span>
                        </div>
                        <label class="relative inline-flex items-center cursor-pointer">
                            <input type="checkbox" id="calcInstallation" class="sr-only peer" onchange="calculatePrice()">
                            <div class="w-11 h-6 bg-gray-700 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-primary border border-white/10"></div>
                        </label>
                    </div>

                    <!-- Plastificado -->
                    <div class="flex items-center justify-between" id="plastificadoContainer">
                        <div class="flex items-center gap-3">
                            <div class="w-8 h-8 rounded-full bg-white/5 flex items-center justify-center">
                                <i class="fas fa-shield-alt text-white/60 text-sm"></i>
                            </div>
                            <span class="text-sm font-bold text-white/90">Plastificado (Protección)</span>
                        </div>
                        <label class="relative inline-flex items-center cursor-pointer">
                            <input type="checkbox" id="calcPlastificado" class="sr-only peer" onchange="calculatePrice()">
                            <div class="w-11 h-6 bg-gray-700 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-primary border border-white/10"></div>
                        </label>
                    </div>
                </div>

                <!-- Price Display -->
                <div class="pt-6 border-t border-white/10">
                    <div class="flex items-center justify-between mb-6 bg-black/30 p-4 rounded-2xl border border-white/5 shadow-lg">
                        <span class="text-sm md:text-lg text-white/70 font-display uppercase tracking-wider font-bold">Total Estimado</span>
                        <span id="calcPrice" class="text-3xl md:text-5xl font-black text-transparent bg-clip-text bg-gradient-to-r from-primary to-yellow-500 font-display transition-all duration-300 drop-shadow-lg">$0</span>
                    </div>
                    
                    <!-- CTA -->
                    <button onclick="quoteOnWhatsApp()" class="w-full py-4 px-6 bg-gradient-to-r from-primary to-orange-600 rounded-xl font-bold text-lg text-white shadow-[0_0_20px_rgba(242,125,38,0.3)] hover:shadow-[0_0_30px_rgba(242,125,38,0.5)] hover:scale-[1.02] active:scale-[0.98] transition-all flex items-center justify-center gap-2 group relative overflow-hidden">
                        <div class="absolute inset-0 bg-white/20 translate-x-[-100%] group-hover:translate-x-[100%] transition-transform duration-700 skew-x-12"></div>
                        <span>Solicitar por WhatsApp</span>
                        <i class="fab fa-whatsapp text-2xl group-hover:rotate-12 transition-transform"></i>
                    </button>
                </div>
            </div>
        </main>
    </div>

    <script>
        // Pricing Data configuration per m2 (in COP)
        const pricing = {
            impresion: { base: 35000, plastificadoOffset: 20000, install: 17000 },
            troquelado: { base: 45000, plastificadoOffset: 0, install: 17000 },
            esmerilado: { base: 40000, plastificadoOffset: 0, install: 17000 },
            transparente: { base: 35000, plastificadoOffset: 20000, install: 17000 },
            microperforado: { base: 45000, plastificadoOffset: 0, install: 17000 }
        };

        const typeSelect = document.getElementById('vinylType');
        const widthInput = document.getElementById('calcWidth');
        const heightInput = document.getElementById('calcHeight');
        const installCheck = document.getElementById('calcInstallation');
        const plastificadoCheck = document.getElementById('calcPlastificado');
        const plastificadoContainer = document.getElementById('plastificadoContainer');
        const priceDisplay = document.getElementById('calcPrice');
        const areaDisplay = document.getElementById('areaDisplay');

        function updateOptionsAndCalculate() {
            const type = typeSelect.value;
            
            // Hide plastificado if not applicable
            if (pricing[type].plastificadoOffset === 0) {
                plastificadoContainer.style.display = 'none';
                plastificadoCheck.checked = false;
            } else {
                plastificadoContainer.style.display = 'flex';
            }

            calculatePrice();
        }

        function calculatePrice() {
            const w = parseFloat(widthInput.value) || 0;
            const h = parseFloat(heightInput.value) || 0;
            const typeKey = typeSelect.value;
            const config = pricing[typeKey];

            // Calculate m2
            const area = (w * h) / 10000;
            areaDisplay.innerText = `Área: ${area.toFixed(2)} m²`;

            if (area > 0) {
                let m2Price = config.base;
                
                if (plastificadoCheck.checked) {
                    m2Price += config.plastificadoOffset;
                }

                let total = area * m2Price;

                if (installCheck.checked) {
                    total += area * config.install;
                }

                priceDisplay.innerText = new Intl.NumberFormat('es-CO', { 
                    style: 'currency', 
                    currency: 'COP', 
                    maximumFractionDigits: 0 
                }).format(total);
            } else {
                priceDisplay.innerText = '$0';
            }
        }

        function quoteOnWhatsApp() {
            const w = widthInput.value;
            const h = heightInput.value;
            const price = priceDisplay.innerText;
            const typeName = typeSelect.options[typeSelect.selectedIndex].text;

            if (!w || !h || w <= 0 || h <= 0) {
                alert("Por favor, ingresa las dimensiones para cotizar.");
                return;
            }

            let msg = `Hola, me gustaría cotizar un trabajo de vinilo.\n\n`;
            msg += `*Tipo:* ${typeName}\n`;
            msg += `*Medidas:* ${w}cm x ${h}cm\n`;
            if (plastificadoCheck.checked && plastificadoContainer.style.display !== 'none') msg += `*Plastificado:* Sí\n`;
            msg += `*Instalación:* ${installCheck.checked ? 'Sí' : 'No'}\n`;
            msg += `*Total Estimado:* ${price}`;

            const phone = "573027502695";
            const url = `https://wa.me/${phone}?text=${encodeURIComponent(msg)}`;
            window.open(url, '_blank');
        }

        // Init
        updateOptionsAndCalculate();
    </script>
</body>
</html>
